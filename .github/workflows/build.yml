name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          set -e

          # Gradle 8.7 — full path, no PATH manipulation needed
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-install
          GRADLE=/tmp/gradle-install/gradle-8.7/bin/gradle
          chmod +x "$GRADLE"
          echo "Gradle: $("$GRADLE" --version | head -1)"

          # sdkmanager — find it wherever it is, don't guess PATH
          SDKMANAGER=$(find "$ANDROID_HOME" -name sdkmanager -type f 2>/dev/null | head -1)
          echo "sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0"

          # Generate keystore
          keytool -genkeypair -noprompt \
            -keystore app/keystore.jks \
            -alias "mykey" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "android123" \
            -keypass "android123" \
            -dname "CN=Dev,OU=Dev,O=Dev,L=City,S=State,C=US"
          echo "=== KEYSTORE_B64_START ===" && base64 -w 0 app/keystore.jks && echo "" && echo "=== KEYSTORE_B64_END ==="

          # Build
          "$GRADLE" assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
