name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-33" "build-tools;33.0.2"
          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses || true

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6.4/bin" >> $GITHUB_PATH

      - name: Generate Keystore
        run: |
          keytool -genkeypair -noprompt -keystore app/keystore.jks -alias "mykey" -keyalg RSA -keysize 2048 -validity 10000 -storepass "android123" -keypass "android123" -dname "CN=APKBuilder,OU=Dev,O=APKBuilder,L=City,S=State,C=US"
          echo "Keystore created: $(ls -la app/keystore.jks)"
          echo "--- KEYSTORE BASE64 (save for future release builds) ---"
          base64 -w 0 app/keystore.jks
          echo ""
          echo "--- END ---"
      - name: Build APK
        run: gradle assembleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
