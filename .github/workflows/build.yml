name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6.4/bin" >> $GITHUB_PATH
      - uses: android-actions/setup-android@v3
      - name: Install SDK
        run: |
          sdkmanager "platforms;android-33" "build-tools;33.0.2" --sdk_root=$ANDROID_HOME
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true
      - name: Build APK
        run: gradle assembleDebug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
