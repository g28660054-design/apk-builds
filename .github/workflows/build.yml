name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6.4/bin" >> $GITHUB_PATH
      - uses: android-actions/setup-android@v3
      - name: Install SDK
        run: |
          sdkmanager "platforms;android-33" "build-tools;33.0.2" --sdk_root=$ANDROID_HOME
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true
      - name: Generate Keystore
        run: |
          keytool -genkeypair -noprompt \
            -keystore app/keystore.jks \
            -alias "mykey" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "android123" \
            -keypass "android123" \
            -dname "CN=APKBuilder,OU=Dev,O=APKBuilder,L=City,S=State,C=US"
          echo ""
          echo "=========================================="
          echo "KEYSTORE BASE64 (сохрани для обновлений):"
          echo "=========================================="
          base64 -w 0 app/keystore.jks
          echo ""
          echo "=========================================="
      - name: Build APK
        run: gradle assembleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
