name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 7.6.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6.4/bin" >> $GITHUB_PATH
          chmod +x /opt/gradle/gradle-7.6.4/bin/gradle

      - name: Setup Android SDK
        run: |
          CMDLINE_TOOLS=$ANDROID_HOME/cmdline-tools/latest/bin
          echo "$CMDLINE_TOOLS" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          export PATH="$CMDLINE_TOOLS:$PATH"
          sdkmanager "platforms;android-33" "build-tools;33.0.2"
          yes | sdkmanager --licenses || true
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Generate Keystore
        run: keytool -genkeypair -noprompt -keystore app/keystore.jks -alias "mykey" -keyalg RSA -keysize 2048 -validity 10000 -storepass "android123" -keypass "android123" -dname "CN=APKBuilder,OU=Dev,O=APKBuilder,L=City,S=State,C=US" && echo "--- KEYSTORE BASE64 ---" && base64 -w 0 app/keystore.jks && echo "" && echo "--- END ---"

      - name: Build APK
        run: /opt/gradle/gradle-7.6.4/bin/gradle assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
