name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: |
          set -e

          # ── Install Gradle ──
          wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip -O /tmp/g.zip
          unzip -q /tmp/g.zip -d /opt/gradle
          GRADLE=/opt/gradle/gradle-7.6.4/bin/gradle
          chmod +x $GRADLE

          # ── Android SDK ──
          SDKMANAGER=$(find "$ANDROID_HOME" -name sdkmanager 2>/dev/null | head -1)
          echo "sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-33" "build-tools;33.0.2"

          # ── Generate keystore ──
          keytool -genkeypair -noprompt \
            -keystore app/keystore.jks \
            -alias "mykey" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "android123" \
            -keypass "android123" \
            -dname "CN=Dev,OU=Dev,O=Dev,L=City,S=State,C=US"
          echo "=== KEYSTORE B64 START ==="
          base64 -w 0 app/keystore.jks
          echo ""
          echo "=== KEYSTORE B64 END ==="

          # ── Compile ──
          $GRADLE assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
