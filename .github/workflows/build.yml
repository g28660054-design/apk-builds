name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Install SDK
        run: |
          sdkmanager "platforms;android-33" "build-tools;33.0.2" --sdk_root=$ANDROID_HOME
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/keystore.jks \
            -alias appkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass buildpass -keypass buildpass \
            -dname "CN=APKBuilder,OU=Dev,O=App,L=City,S=State,C=US" \
            -storetype JKS
      - name: Build APK
        run: ./gradlew assembleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          STORE_PASS: "buildpass"
          KEY_ALIAS: "appkey"
          KEY_PASS: "buildpass"
      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
