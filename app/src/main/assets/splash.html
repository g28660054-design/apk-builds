<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#07090d}
.splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:linear-gradient(135deg,#07090d 0%,#0d1a2e 50%,#07090d 100%);
  z-index:9999;transition:opacity .6s ease,transform .6s ease}
.splash.fade{opacity:0;transform:scale(1.05);pointer-events:none}
.logo-wrap{position:relative;margin-bottom:32px}
.logo-ring{width:90px;height:90px;border-radius:22px;
  background:linear-gradient(135deg,#0060f0,#00c3ff);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px #00c3ff33,0 0 80px #0060f011;
  animation:pulse 2s ease infinite}
.logo-ring svg{width:46px;height:46px}
@keyframes pulse{0%,100%{box-shadow:0 0 40px #00c3ff33,0 0 80px #0060f011}50%{box-shadow:0 0 60px #00c3ff55,0 0 120px #0060f022}}
.app-name{font-family:sans-serif;font-size:28px;font-weight:800;color:#fff;
  letter-spacing:.5px;margin-bottom:8px;text-align:center}
.app-sub{font-family:sans-serif;font-size:13px;color:rgba(255,255,255,.35);
  letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:40px}
.bar-wrap{width:160px;height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#00c3ff,#0060f0);
  border-radius:3px;animation:load 1.8s ease forwards;animation-delay:.3s}
@keyframes load{0%{width:0%}60%{width:75%}80%{width:88%}100%{width:100%}}
.dot{position:absolute;border-radius:50%;animation:float 3s ease infinite}
.d1{width:6px;height:6px;background:#00c3ff44;top:-20px;right:-30px;animation-delay:0s}
.d2{width:4px;height:4px;background:#0060f044;bottom:-15px;left:-25px;animation-delay:.7s}
.d3{width:8px;height:8px;background:#00c3ff22;top:10px;left:-40px;animation-delay:1.4s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div class="splash" id="sp">
  <div class="logo-wrap">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div>
  </div>
  <div class="app-name">Js learn</div>
  <div class="app-sub">Loading</div>
  <div class="bar-wrap"><div class="bar"></div></div>
</div>
<script>
  window.addEventListener('load',function(){
    setTimeout(function(){
      document.getElementById('sp').classList.add('fade');
      setTimeout(function(){window.location.href='index.html';},650);
    },2000);
  });
</script>
</body>
</html>
