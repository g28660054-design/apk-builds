<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Tap Game</title>
    <style        * {
            box-sizing: border-box;
            margin:0;
            padding: 0            -webkit-tap-highlight-color: transparent;
            user-select none;
        }
        body {
 background: linear-gradient(135deg, #0f0c29, #302b, #24243e);
           : #fff;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #00d4ff, #a855f7);
            -webkit-background-clip: text;
            --text-fill-color: transparent;
        }
        p {
            font-size: 0.85rem            opacity: 0.45            margin-bottom: 40px;
        }
        . {
            width: 150px;
            height: 150px;
            border-radius:50%;
            background: radial-gradient(circle at 38% 32%, #a855f7, #4f46e5);
            border: none;
            cursor: pointer;
 font-size: 3rem;
            box-shadow: 0 0 60px rgba(124, 58, 237, 0.27), 0 10px40px rgba(0, 0 0, 0.33);
            transition: transform 0.1s;
        }
        .btn:active {
            transform: scale(0.88);
        }
        .score {
            font-size: 5rem;
            font-weight: bold;
            margin-top: 28px;
            background: linear-gradient(90deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .lbl {
            font-size: 0.75rem;
            opacity: 0.4;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <h1>Tap Master</h1>
    <p>флайн игра</p>
   button class="btn" onclick="tap()">TAP</button>
    <div class="score" id="sc">0</div>
    <div class="lbl">очков</div>
    <script>
        let score = +localStorage.getItem('score') || 0;
        const scoreElement = document.getElementById('sc');
        scoreElement.textContent = score;

        function tap() {
            score++;
            scoreElement.textContent = score;
            localStorage.setItem('score', score);
            if (navigator.vibrate) navigator.vibrate(15);
        }
    </script>
</body>
</html>
