<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #cce5ff, #99ccff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 1px solid #000;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0.8;
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>Runner Game</h1>
        <button id="startButton">Начать игру</button>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gravity = 0.5;
        const jumpStrength = 10;
        let isJumping = false;
        let jumpVelocity = 0;

        let score = 0;
        const scoreElement = document.createElement('div');
        scoreElement.style.position = 'absolute';
        scoreElement.style.top = '10px';
        scoreElement.style.right = '20px';
        scoreElement.style.fontSize = '20px';
        scoreElement.innerHTML = 'Счет: ' + score;
        document.body.appendChild(scoreElement);

        const player = {
            x: 50,
            y: 200,
            width: 40,
            height: 40,
            color: 'red',
            update() {
                if (this.y + this.height < canvas.height) {
                    this.y += jumpVelocity;
                    jumpVelocity += gravity;
                } else {
                    this.y = canvas.height - this.height;
                    jumpVelocity = 0;
                }
            },
            jump() {
                if (this.y === canvas.height - this.height) {
                    jumpVelocity = -jumpStrength;
                    navigator.vibrate(100);
                }
            },
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        };

        function resetGame() {
            score = 0;
            player.y = canvas.height - player.height;
            jumpVelocity = 0;
            scoreElement.innerHTML = 'Счет: ' + score;
            localStorage.setItem('highScore', Math.max(score, localStorage.getItem('highScore') || 0));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            player.update();
            player.draw();
            scoreElement.innerHTML = 'Счет: ' + score++;
            requestAnimationFrame(draw);
        }

        document.getElementByIdstartButton').addEventListener('click', function() {
           .getElementById('startScreen').style.display = 'none';
            resetGame();
            draw();
        });

        window.addEventListener('keydown', (event) => {
            if (event.code === 'Space {
                player.jump();
            }
        });
    </script>
</body>
</html>
